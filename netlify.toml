[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/booking"
  to = "/booking.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin/"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/server.js"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/server-*.log"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
