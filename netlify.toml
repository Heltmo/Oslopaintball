[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["admin.html", "admin-auth.js", "booking-notifications.js"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/booking"
  to = "/booking.html"
  status = 200

[[redirects]]
  from = "/booking/"
  to = "/booking.html"
  status = 200

[[redirects]]
  from = "/personvern"
  to = "/personvern.html"
  status = 200

[[redirects]]
  from = "/personvern/"
  to = "/personvern.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin/"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/server.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/server-*.log"
  to = "/404.html"
  status = 404
  force = true


[[redirects]]
  from = "/.env.example"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.gitignore"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.nvmrc"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/_redirects"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/booking-notifications.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin-auth.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/LAUNCH_CHECKLIST.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/KENNETH_BRUKERVEILEDNING.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/admin*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
